apiVersion: v1
kind: Namespace
metadata:
  name: airflow
---
apiVersion: v1
kind: Namespace
metadata:
  name: kubecost
---
apiVersion: v1
kind: Namespace
metadata:
  name: spark-operator
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.sparkWorkloadNamespace | quote }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: gp3
  encrypted: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-task
  namespace: airflow
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-workload
  namespace: {{ .Values.global.sparkWorkloadNamespace | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-spark-access
  namespace: {{ .Values.global.sparkWorkloadNamespace | quote }}
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications", "sparkapplications/status"]
    verbs: ["create", "get", "list", "watch", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-spark-access
  namespace: {{ .Values.global.sparkWorkloadNamespace | quote }}
subjects:
  - kind: ServiceAccount
    name: airflow-task
    namespace: airflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airflow-spark-access
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: {{ .Values.global.sparkWorkloadNamespace | quote }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver
  namespace: {{ .Values.global.sparkWorkloadNamespace | quote }}
subjects:
  - kind: ServiceAccount
    name: spark-workload
    namespace: {{ .Values.global.sparkWorkloadNamespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-driver
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-tailscale
  namespace: argocd
  annotations:
    tailscale.com/hostname: {{ .Values.global.argocdTailscaleHostname | quote }}
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-tailscale
  namespace: airflow
  annotations:
    tailscale.com/hostname: {{ .Values.global.airflowTailscaleHostname | quote }}
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    tier: airflow
    component: api-server
    release: airflow
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kubecost-tailscale
  namespace: kubecost
  annotations:
    tailscale.com/hostname: {{ .Values.global.kubecostTailscaleHostname | quote }}
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: cost-analyzer
    app.kubernetes.io/instance: kubecost
    app: cost-analyzer
  ports:
    - name: http
      port: 80
      targetPort: 9090
      protocol: TCP
