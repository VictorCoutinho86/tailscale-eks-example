kubecost:
  # Network-costs runs a DaemonSet on every node; on the small default nodes it
  # does not fit and leaves pods pending. Disabled for this MVP cluster.
  networkCosts:
    enabled: true
  serviceAccount:
    create: false
    name: kubecost-aws
  cloudCost:
    serviceAccountName: kubecost-aws
  extraObjects:
    - apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: kubecost-aws
        namespace: kubecost
