apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: airflow-db
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: airflow
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  storage:
    size: 10Gi
    storageClass: ebs-sc

  resources:
    requests:
      memory: 2Gi
      cpu: 1
    limits:
      memory: 2Gi
      cpu: 1

  monitoring:
    enablePodMonitor: true

  bootstrap:
    initdb:
      database: airflow
      owner: airflow
      secret:
        name: airflow-db-credentials

  backup:
    barmanObjectStore:
      destinationPath: s3://{{ .Values.global.cnpgBackupBucket }}/airflow-db/
      s3Credentials:
        inheritFromIAMRole: true
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: 7d
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: airflow-db-daily
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: airflow
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  schedule: "0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: airflow-db
