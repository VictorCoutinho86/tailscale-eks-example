apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-secret
  namespace: argocd
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    admin.password: AgCHANGE_ME_RUN_seal_secrets_sh
    admin.passwordMtime: AgCHANGE_ME_RUN_seal_secrets_sh
    server.secretkey: AgCHANGE_ME_RUN_seal_secrets_sh
  template:
    metadata:
      name: argocd-secret
      namespace: argocd
      labels:
        app.kubernetes.io/component: server
        app.kubernetes.io/name: argocd-secret
        app.kubernetes.io/part-of: argocd
    type: Opaque
