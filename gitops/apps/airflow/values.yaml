airflow:
  # Static keys keep Argo CD client-side renders deterministic. Without them the
  # chart generates randAlphaNum values on every sync, rotating keys and breaking
  # encrypted connections. These are dev/example keys: rotate and manage them
  # through an external secrets store before any production use.
  fernetKey: lf5ACTMLLKWof80nMQTCx1rmE6KTu_LDQJWaZ5nfJMs=
  # The chart's own fernet-key secret is annotated as a helm pre-install hook,
  # which Argo CD does not apply as a regular resource. The wrapper chart renders
  # this secret instead (templates/fernet-key-secret.yaml).
  fernetKeySecretName: airflow-fernet-key
  jwtSecret: jV3LGNX_GG3Y_L05RgK79VV2kQlJ9dUzJSYgQ1_slgzJ92Mwjthqb-BQF0w08SpS
  apiSecretKey: hCWaIYLP0sdA2X8e7aVFsm-PwWdAr1_zD4Q_khIIx1o
  executor: KubernetesExecutor
  rbac:
    create: true
  dags:
    persistence:
      enabled: false
  logs:
    persistence:
      enabled: false
  apiServer:
    resources:
      limits:
        memory: 900Mi
  scheduler:
    resources:
      limits:
        memory: 900Mi
  triggerer:
    resources:
      limits:
        memory: 900Mi
    persistence:
      enabled: false
  dagProcessor:
    dagBundleConfigList:
      - name: dags-repository
        classpath: airflow.providers.git.bundles.git.GitDagBundle
        kwargs:
          tracking_ref: master
          refresh_interval: 300
          submodules: false
          prune_dotgit_folder: true
          git_conn_id: git_dags
    resources:
      limits:
        memory: 900Mi
  extraEnv: |
    - name: AIRFLOW_CONN_GIT_DAGS
      value: git://https%3A%2F%2Fgithub.com%2FVictorCoutinho86%2Fdags.git
  workers:
    resources:
      limits:
        memory: 900Mi
    celery:
      persistence:
        enabled: false
    serviceAccount:
      create: false
      name: airflow-task
  redis:
    enabled: false
    persistence:
      enabled: false
  createUserJob:
    useHelmHooks: false
    applyCustomEnv: false
  migrateDatabaseJob:
    useHelmHooks: false
    applyCustomEnv: false
    jobAnnotations:
      argocd.argoproj.io/hook: Sync
