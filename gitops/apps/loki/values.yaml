loki:
  namespaceOverride: monitoring

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1

    limits_config:
      allow_structured_metadata: true

    storage:
      type: s3
      bucketNames:
        chunks: tailscale-eks-example-loki-CHANGEME
        ruler: tailscale-eks-example-loki-CHANGEME
        admin: tailscale-eks-example-loki-CHANGEME
      s3:
        region: us-east-1

    serviceAccount:
      create: true
      name: loki
      annotations:
        eks.amazonaws.com/role-arn: CHANGEME

  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    persistence:
      enabled: false

  gateway:
    enabled: false

  test:
    enabled: false
