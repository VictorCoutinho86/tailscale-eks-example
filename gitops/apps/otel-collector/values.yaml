opentelemetry-collector:
  mode: deployment
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlphttp:
        endpoint: http://loki.monitoring:3100/otlp
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlphttp, debug]
