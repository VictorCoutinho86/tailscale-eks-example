---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.global.certificateArn | quote }}
    external-dns.alpha.kubernetes.io/hostname: {{ printf "argocd.%s" .Values.global.domain | quote }}
    argocd.argoproj.io/sync-wave: "4"
spec:
  ingressClassName: alb
  rules:
    - host: {{ printf "argocd.%s" .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airflow
  namespace: airflow
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.global.certificateArn | quote }}
    external-dns.alpha.kubernetes.io/hostname: {{ printf "airflow.%s" .Values.global.domain | quote }}
    argocd.argoproj.io/sync-wave: "4"
spec:
  ingressClassName: alb
  rules:
    - host: {{ printf "airflow.%s" .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
